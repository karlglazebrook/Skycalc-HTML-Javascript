// ── Helpers ────────────────────────────────────────────────────────
const MONTHS     = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS_SHORT = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

function nowToJD() {
  return Date.now() / 86400000.0 + 2440587.5;
}

function horizDeg(site) {
  return Math.sqrt(2 * site.elevhoriz / 6378140) * DEG_IN_RADIAN;
}

function getDSTInfo(jd, site) {
  const cal = caldat(jd);
  const { jdb, jde } = findDSTBounds(cal.y, site.stdz, site.useDST);
  const zone = zoneOffset(site.useDST, site.stdz, jd, jdb, jde);
  return { zone, jdb, jde };
}

function jdToLocalCal(jd, zone) {
  return caldat(jd - zone / 24);
}

// ── Formatting helpers ─────────────────────────────────────────────
function fmtHMS(hrs, decimals) {
  if (decimals === undefined) decimals = 1;
  const neg = hrs < 0;
  const abs = Math.abs(hrs);
  const h = Math.trunc(abs);
  const mf = (abs - h) * 60;
  const m = Math.trunc(mf);
  const s = (mf - m) * 60;
  let ss;
  if (decimals > 0) {
    ss = s.toFixed(decimals).padStart(decimals + 3, '0');
  } else {
    ss = Math.round(s).toString().padStart(2, '0');
  }
  return `${neg ? '&minus;' : ''}${h}<span class="unit">h</span>${String(m).padStart(2,'0')}<span class="unit">m</span>${ss}<span class="unit">s</span>`;
}

function fmtHMSplain(hrs) {
  const neg = hrs < 0;
  const abs = Math.abs(hrs);
  const h = Math.trunc(abs);
  const mf = (abs - h) * 60;
  const m = Math.trunc(mf);
  const s = Math.round((mf - m) * 60);
  return `${neg ? '-' : ''}${h}h${String(m).padStart(2,'0')}m${String(s).padStart(2,'0')}s`;
}

function fmtHA(hrs) {
  const dir = hrs <= 0
    ? '<span class="badge-e">E</span>'
    : '<span class="badge-w">W</span>';
  return fmtHMS(hrs) + ' ' + dir;
}

function fmtDMS(deg, decimals) {
  if (decimals === undefined) decimals = 0;
  const neg = deg < 0;
  const abs = Math.abs(deg);
  const d = Math.trunc(abs);
  const mf = (abs - d) * 60;
  const m = Math.trunc(mf);
  const s = decimals > 0 ? ((mf - m) * 60).toFixed(decimals) : Math.round((mf - m) * 60).toString();
  return `${neg ? '&minus;' : '+'}${d}&deg;${String(m).padStart(2,'0')}&prime;${String(s).padStart(2,'0')}&Prime;`;
}

function fmtDeg(deg, dec) {
  if (dec === undefined) dec = 2;
  return deg.toFixed(dec) + '&deg;';
}

function fmtLocalTime(jd, zone) {
  const c = caldat(jd - zone / 24);
  return `${String(c.h).padStart(2,'0')}:${String(c.mn).padStart(2,'0')}`;
}

function fmtLocalTimeSec(jd, zone) {
  const c = caldat(jd - zone / 24);
  return `${String(c.h).padStart(2,'0')}:${String(c.mn).padStart(2,'0')}:${String(Math.round(c.s)).padStart(2,'0')}`;
}

function fmtDate(cal) {
  return `${DAYS_SHORT[cal.dow]} ${cal.d} ${MONTHS[cal.mo-1]} ${cal.y}`;
}

function fmtFullTime(cal) {
  return `${String(cal.h).padStart(2,'0')}:${String(cal.mn).padStart(2,'0')}:${String(Math.round(cal.s)).padStart(2,'0')}`;
}

function fmtUTTime(jd) {
  const c = caldat(jd);
  return `${String(c.h).padStart(2,'0')}:${String(c.mn).padStart(2,'0')} UT`;
}

function airmassClass(secz) {
  if (secz <= 0 || secz > 100) return 'poor';
  if (secz < 1.5) return 'excellent';
  if (secz < 2.0) return 'good';
  if (secz < 3.0) return 'marginal';
  return 'poor';
}

function sunClass(alt) {
  if (alt < -18) return 'night';
  if (alt < -12) return 'astro';
  if (alt < -6)  return 'nautical';
  if (alt < 0)   return 'civil';
  return 'day';
}

function sunLabel(alt) {
  if (alt < -18) return 'Night';
  if (alt < -12) return 'Astro twilight';
  if (alt < -6)  return 'Nautical twilight';
  if (alt < 0)   return 'Civil twilight';
  return 'Day';
}

// ── RA / Dec parsing ───────────────────────────────────────────────
function parseRA(str) {
  str = str.trim().replace(/[:\s]+/g, ' ');
  const parts = str.split(' ').filter(Boolean);
  if (parts.length >= 3) return +parts[0] + +parts[1]/60 + +parts[2]/3600;
  if (parts.length === 2) return +parts[0] + +parts[1]/60;
  return parseFloat(str);
}

function parseDec(str) {
  str = str.trim();
  const neg = str.startsWith('-');
  str = str.replace(/^[-+]/, '').replace(/[:\s]+/g, ' ');
  const parts = str.split(' ').filter(Boolean);
  let val;
  if (parts.length >= 3) val = +parts[0] + +parts[1]/60 + +parts[2]/3600;
  else if (parts.length === 2) val = +parts[0] + +parts[1]/60;
  else val = parseFloat(str);
  return neg ? -val : val;
}

// ── Compute Circumstances ──────────────────────────────────────────
function computeCircumstances(state) {
  const { site, jdUT, ra, dec, epoch } = state;
  const jd = jdUT;
  const lmst = lst(jd, site.longit);
  const curEpoch = 2000.0 + (jd - J2000) / 365.25;

  const { zone } = getDSTInfo(jd, site);
  const utCal  = caldat(jd);
  const locCal = jdToLocalCal(jd, zone);

  const prec = precrot(ra, dec, epoch, curEpoch);
  const ha   = adjTime(lmst - prec.ra);
  const { alt, az } = altit(prec.dec, ha, site.lat);
  const secz = secantZ(alt);
  const pa   = parang(ha, prec.dec, site.lat);

  const sun   = accusun(jd, lmst, site.lat);
  const sunHA = adjTime(lmst - sun.topora);
  const { alt: sunAlt } = altit(sun.topodec, sunHA, site.lat);

  const moon   = accumoon(jd, site.lat, lmst, site.elevsea);
  const moonHA = adjTime(lmst - moon.topora);
  const { alt: moonAlt } = altit(moon.topodec, moonHA, site.lat);
  const la        = lunAge(jd);
  const moonPhase = moonPhaseText(jd);
  const moonIllum = (1 - Math.cos(2 * PI * la.age / 29.5307)) / 2;
  const moonDistRad = subtend(prec.ra, prec.dec, moon.topora, moon.topodec);
  const moonDistDeg = moonDistRad * DEG_IN_RADIAN;

  const hc  = helcor(jd, prec.ra, prec.dec, ha, site.lat, site.elevsea);
  const bjd = jd + hc.tcor / SEC_IN_DAY;
  const dt  = etcorr(jd);

  const gal = galact(ra, dec, epoch);
  const ecl = eclipt(ra, dec, epoch, jd);

  return {
    jd, lmst, curEpoch, zone,
    utCal, locCal,
    ra, dec, epoch,
    prec,
    ha, alt, az, secz, pa,
    sunAlt,
    moonAlt, moonPhase, moonIllum, moonDistDeg,
    hc, bjd, dt,
    gal, ecl
  };
}

// ── Compute Almanac ────────────────────────────────────────────────
function computeAlmanac(state) {
  const { site, jdUT } = state;
  const jd = jdUT;

  const { zone, jdb, jde } = getDSTInfo(jd, site);
  const locCal = jdToLocalCal(jd, zone);

  // Local midnight of the current observing night.
  // "Night date" convention: if local hour < 12 (i.e., we're past midnight), we're still
  // in the previous night — subtract 1 day so midnight refers to the same night.
  let y = locCal.y, mo = locCal.mo, d = locCal.d;
  if (locCal.h < 12) {
    const prevJD = dateToJD(y, mo, d, 0, 0, 0) - 1;  // go back 1 day
    const prev = caldat(prevJD);
    y = prev.y; mo = prev.mo; d = prev.d;
  }
  // JD of local midnight (end of this observing day = d+1 00:00 local)
  const jdMidnightLocal = dateToJD(y, mo, d, 24, 0, 0);
  const jdmid = jdMidnightLocal + zone / 24;

  const horiz = horizDeg(site);

  function sunEvt(alt, guess) {
    const r = jdSunAlt(alt, guess, site.lat, site.longit);
    return r < -999 ? null : r;
  }
  function moonEvt(alt, guess) {
    const r = jdMoonAlt(alt, guess, site.lat, site.longit, site.elevsea);
    return r < -999 ? null : r;
  }

  const jdSunset  = sunEvt(-0.833 - horiz, jdmid - 6/24);
  const jdSunrise = sunEvt(-0.833 - horiz, jdmid + 6/24);
  const jdEveT18  = jdSunset  ? sunEvt(-18, jdSunset  + 1.5/24) : null;
  const jdMornT18 = jdSunrise ? sunEvt(-18, jdSunrise - 1.5/24) : null;
  const jdEveT12  = jdSunset  ? sunEvt(-12, jdSunset  + 1/24)   : null;
  const jdMornT12 = jdSunrise ? sunEvt(-12, jdSunrise - 1/24)   : null;
  const jdEveT6   = jdSunset  ? sunEvt(-6,  jdSunset  + 0.5/24) : null;
  const jdMornT6  = jdSunrise ? sunEvt(-6,  jdSunrise - 0.5/24) : null;

  const jdMoonset  = moonEvt(-horiz, jdmid - 6/24);
  const jdMoonrise = moonEvt(-horiz, jdmid + 6/24);

  const darkHours = (jdMornT18 && jdEveT18)
    ? (jdMornT18 - jdEveT18) * 24 : null;

  // Moon dark hours (moon down during astronomical darkness)
  let moonDarkHours = null;
  if (jdEveT18 && jdMornT18) {
    const darkStart = jdEveT18;
    const darkEnd   = jdMornT18;
    const mset = jdMoonset;
    const mrise = jdMoonrise;
    // Simple estimate: subtract moon-up time during dark period
    let moonUp = 0;
    if (mset && mset > darkStart && mset < darkEnd) {
      // moon sets during dark period — moon was up from darkStart to mset
      moonUp = (mset - darkStart) * 24;
    }
    if (mrise && mrise > darkStart && mrise < darkEnd) {
      // moon rises during dark period
      moonUp += (darkEnd - mrise) * 24;
    }
    if (mset && mrise && mset > darkStart && mrise > darkStart) {
      // both events in dark window handled above
    } else if (!mset && !mrise) {
      // check if moon is up all night or down all night at midnight
      const moonMid = accumoon(jdmid, site.lat, lst(jdmid, site.longit), site.elevsea);
      const moonMidHA = adjTime(lst(jdmid, site.longit) - moonMid.topora);
      const { alt: moonMidAlt } = altit(moonMid.topodec, moonMidHA, site.lat);
      if (moonMidAlt > -horiz) moonUp = darkHours || 0; // moon up all dark
    }
    moonDarkHours = Math.max(0, (darkHours || 0) - moonUp);
  }

  // Moon at midnight
  const moonMid = accumoon(jdmid, site.lat, lst(jdmid, site.longit), site.elevsea);
  const laMid   = lunAge(jdmid);
  const moonIllumMid = (1 - Math.cos(2 * PI * laMid.age / 29.5307)) / 2;

  const lmstMid = lst(jdmid, site.longit);

  function fmt(jd_evt) {
    if (!jd_evt) return { local: '—', ut: '' };
    return {
      local: fmtLocalTime(jd_evt, zone),
      ut:    fmtUTTime(jd_evt),
    };
  }

  return {
    zone,
    jdmid,
    sunset:   fmt(jdSunset),
    sunrise:  fmt(jdSunrise),
    eveT18:   fmt(jdEveT18),
    mornT18:  fmt(jdMornT18),
    eveT12:   fmt(jdEveT12),
    mornT12:  fmt(jdMornT12),
    eveT6:    fmt(jdEveT6),
    mornT6:   fmt(jdMornT6),
    moonrise: fmt(jdMoonrise),
    moonset:  fmt(jdMoonset),
    darkHours,
    moonDarkHours,
    moonIllumMid,
    moonPhaseMid: moonPhaseText(jdmid),
    lmstMid,
    locDate: fmtDate(locCal),
  };
}

// ── Compute Planets ────────────────────────────────────────────────
function computePlanets(state) {
  const { site, jdUT } = state;
  const jd  = jdUT;
  const sid = lst(jd, site.longit);

  const sun   = accusun(jd, sid, site.lat);
  const sunHA = adjTime(sid - sun.topora);
  const sunAz = altit(sun.topodec, sunHA, site.lat);

  const moon   = accumoon(jd, site.lat, sid, site.elevsea);
  const moonHA = adjTime(sid - moon.topora);
  const moonAz = altit(moon.topodec, moonHA, site.lat);

  const planets = pposns(jd, site.lat, sid);
  const PNAMES  = ['Mercury','Venus',null,'Mars','Jupiter','Saturn','Uranus','Neptune','Pluto'];

  const rows = [];
  rows.push({ name:'Sun',  ra:sun.topora,  dec:sun.topodec,  ha:sunHA,  alt:sunAz.alt,  az:sunAz.az,  secz:secantZ(sunAz.alt),  type:'sun' });
  rows.push({ name:'Moon', ra:moon.topora, dec:moon.topodec, ha:moonHA, alt:moonAz.alt, az:moonAz.az, secz:secantZ(moonAz.alt), type:'moon' });

  for (let i = 0; i < 9; i++) {
    if (!planets[i]) continue;
    const p  = planets[i];
    const ha = adjTime(sid - p.ra);
    const { alt, az } = altit(p.dec, ha, site.lat);
    rows.push({ name: PNAMES[i], ra: p.ra, dec: p.dec, ha, alt, az, secz: secantZ(alt), type:'planet' });
  }
  return rows;
}

// ── Compute Hourly ─────────────────────────────────────────────────
function computeHourly(state) {
  const { site, jdUT, ra, dec, epoch } = state;
  const jd = jdUT;

  const { zone } = getDSTInfo(jd, site);
  const locCal = jdToLocalCal(jd, zone);
  let y = locCal.y, mo = locCal.mo, d = locCal.d;
  if (locCal.h < 12) { const p = caldat(dateToJD(y,mo,d,0,0,0)-1); y=p.y; mo=p.mo; d=p.d; }
  const jdMidnightLocal = dateToJD(y, mo, d, 24, 0, 0);
  const jdmid = jdMidnightLocal + zone / 24;

  const curEpoch = 2000.0 + (jd - J2000) / 365.25;
  const prec = precrot(ra, dec, epoch, curEpoch);

  const rows = [];
  for (let dh = -13; dh <= 13; dh += 1) {
    const jdt = jdmid + dh / 24;
    const sid  = lst(jdt, site.longit);
    const ha   = adjTime(sid - prec.ra);
    const { alt, az } = altit(prec.dec, ha, site.lat);
    const secz = secantZ(alt);
    const pa   = parang(ha, prec.dec, site.lat);

    const sun   = accusun(jdt, sid, site.lat);
    const sunHA = adjTime(sid - sun.topora);
    const { alt: sunAlt } = altit(sun.topodec, sunHA, site.lat);

    if (sunAlt > -5) continue;  // skip daytime rows

    const moon   = accumoon(jdt, site.lat, sid, site.elevsea);
    const moonHA = adjTime(sid - moon.topora);
    const { alt: moonAlt } = altit(moon.topodec, moonHA, site.lat);

    rows.push({
      jdt, dh,
      localTime: fmtLocalTime(jdt, zone),
      localDate: fmtDate(caldat(jdt - zone/24)),
      ha, alt, az, secz, pa,
      sunAlt,
      moonAlt,
    });
  }
  return rows;
}

// ── Compute Observability ──────────────────────────────────────────
function computeObservability(state, startJD, endJD, sunAltDeg) {
  const { site, ra, dec, epoch } = state;

  const la0 = lunAge(startJD);
  let nlun = la0.nlun;
  // Back up one to ensure we don't miss the first event
  nlun = nlun - 1;

  const results = [];

  for (let iter = 0; iter < 60; iter++) {
    for (const nph of [0, 2]) { // 0=new, 2=full
      const jdPhase = flmoon(nlun, nph);
      if (jdPhase < startJD - 2 || jdPhase > endJD + 2) continue;

      const { zone } = getDSTInfo(jdPhase, site);
      const locCal   = jdToLocalCal(jdPhase, zone);
      const y = locCal.y, mo = locCal.mo, d = locCal.d;
      const jdMidnightLocal = dateToJD(y, mo, d, 24, 0, 0);
      const jdmid = jdMidnightLocal + zone / 24;

      if (jdmid < startJD || jdmid > endJD) continue;

      const curEpoch = 2000.0 + (jdmid - J2000) / 365.25;
      const prec = precrot(ra, dec, epoch, curEpoch);

      // Evening twilight
      const horiz = horizDeg(site);
      const jdEveT  = jdSunAlt(sunAltDeg, jdmid - 6/24, site.lat, site.longit);
      const jdMornT = jdSunAlt(sunAltDeg, jdmid + 6/24, site.lat, site.longit);

      function objAt(jdt) {
        const sid = lst(jdt, site.longit);
        const ha  = adjTime(sid - prec.ra);
        const { alt } = altit(prec.dec, ha, site.lat);
        const secz = secantZ(alt);
        return { ha, secz, alt };
      }

      const eve  = jdEveT  > -999 ? objAt(jdEveT)  : null;
      const ctr  = objAt(jdmid);
      const morn = jdMornT > -999 ? objAt(jdMornT) : null;

      // Count hours accessible
      let hrs3 = 0, hrs2 = 0, hrs1p5 = 0;
      if (jdEveT > -999 && jdMornT > -999) {
        const step = 0.1 / 24;
        for (let jdt = jdEveT; jdt <= jdMornT; jdt += step) {
          const { secz, alt } = objAt(jdt);
          if (alt > 0 && secz < 100) {
            hrs3   += (secz < 3.0)   ? step * 24 : 0;
            hrs2   += (secz < 2.0)   ? step * 24 : 0;
            hrs1p5 += (secz < 1.5)   ? step * 24 : 0;
          }
        }
      }

      results.push({
        jdPhase,
        phase: nph === 0 ? 'N' : 'F',
        dateStr: fmtDate(locCal),
        eve, ctr, morn,
        hrs3:   hrs3.toFixed(1),
        hrs2:   hrs2.toFixed(1),
        hrs1p5: hrs1p5.toFixed(1),
      });
    }
    nlun++;
    if (flmoon(nlun, 0) > endJD + 60) break;
  }

  results.sort((a, b) => a.jdPhase - b.jdPhase);
  return results;
}

// ── Site dropdown ─────────────────────────────────────────────────

// ── Time input sync ────────────────────────────────────────────────
function updateTimeInputsFromJD(jd) {
  const c = caldat(jd);
  const yy = String(c.y).padStart(4,'0');
  const mm = String(c.mo).padStart(2,'0');
  const dd = String(c.d).padStart(2,'0');
  elDate.value = `${yy}-${mm}-${dd}`;
  const hh  = String(c.h).padStart(2,'0');
  const min = String(c.mn).padStart(2,'0');
  const sec = String(Math.round(c.s)).padStart(2,'0');
  elTime.value = `${hh}:${min}:${sec}`;
}

function jdFromInputs() {
  const dateParts = elDate.value.split('-').map(Number);
  if (dateParts.length < 3 || isNaN(dateParts[0])) return nowToJD();
  const [y, mo, d] = dateParts;
  const timeParts  = elTime.value.split(':').map(Number);
  const h  = timeParts[0] || 0;
  const mn = timeParts[1] || 0;
  const s  = timeParts[2] || 0;

  if (elUTCheck.checked) {
    return dateToJD(y, mo, d, h, mn, s);
  } else {
    // Local time entered — convert using site zone
    const jdGuess = dateToJD(y, mo, d, h, mn, s);
    const { zone } = getDSTInfo(jdGuess, AppState.site);
    return dateToJD(y, mo, d, h, mn, s) + zone / 24;
  }
}

  updateTimeInputsFromJD(AppState.jdUT);
  if (AppState.nowTimer) clearInterval(AppState.nowTimer);
  AppState.nowTimer = setInterval(() => {
    if (!AppState.isNowMode) return;
    AppState.jdUT = nowToJD();
    updateTimeInputsFromJD(AppState.jdUT);
    updateHeaderJD();
    if (AppState.activeTab === 'circumstances') renderCircumstances();

}

function stopNowMode() {
  AppState.isNowMode = false;
  elNowBtn.textContent = '▶ NOW';
  elNowBtn.classList.remove('active');
  if (AppState.nowTimer) { clearInterval(AppState.nowTimer); AppState.nowTimer = null; }
}

// ── Header JD / LMST update ────────────────────────────────────────
function updateHeaderJD() {
  const jd   = AppState.jdUT;
  const lmst = lst(jd, AppState.site.longit);
  elHdrJD.textContent   = jd.toFixed(5);
  elHdrLMST.textContent = fmtHMSplain(lmst);
}

// ── Tab switching ─────────────────────────────────────────────────
function switchTab(tabName) {
  AppState.activeTab = tabName;
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tabName);
  });
  document.querySelectorAll('.tab-pane').forEach(p => {
    p.classList.toggle('active', p.id === 'pane-' + tabName);
  });
  renderActiveTab();
}

function renderActiveTab() {
  switch (AppState.activeTab) {
    case 'circumstances':  renderCircumstances(); break;
    case 'almanac':        renderAlmanac();       break;
    case 'planets':        renderPlanets();       break;
    case 'hourly':         renderHourly();        break;
    case 'observability':  /* only on button */   break;
  }
}

// ── Render Circumstances ───────────────────────────────────────────
function kv(label, value, extraClass) {
  const cls = extraClass ? ` class="${extraClass}"` : '';
  return `<div class="kv-row"><span class="kv-key">${label}</span><span class="kv-val${cls}">${value}</span></div>`;
}

function card(title, rows) {
  return `<div class="card"><div class="card-title">${title}</div>${rows}</div>`;
}

function renderCircumstances() {
  const c = computeCircumstances(AppState);
  const acls = airmassClass(c.secz);
  const scls = sunClass(c.sunAlt);

  // Zone label
  const zSign = c.zone <= 0 ? '+' : '−';
  const zAbs  = Math.abs(c.zone);
  const zoneLabel = `UTC${zSign}${zAbs}`;

  // TIME card
  const timeCard = card('Time', [
    kv('UT date/time', `${fmtDate(c.utCal)} ${fmtFullTime(c.utCal)}`),
    kv(`Local (${zoneLabel})`, `${fmtDate(c.locCal)} ${fmtFullTime(c.locCal)}`),
    kv('Julian Date', c.jd.toFixed(5)),
    kv('LMST', fmtHMS(c.lmst)),
    kv('&Delta;T (TT&minus;UT)', `${c.dt.toFixed(1)} s`),
  ].join(''));

  // OBJECT card
  const objCard = card('Object', [
    kv('RA (input)',   fmtHMS(c.ra)),
    kv('Dec (input)',  fmtDMS(c.dec)),
    kv('Epoch',        c.epoch.toFixed(1)),
    kv('RA (current)', fmtHMS(c.prec.ra)),
    kv('Dec (current)',fmtDMS(c.prec.dec)),
    kv('Epoch now',    c.curEpoch.toFixed(2)),
  ].join(''));

  // POINTING card
  const altColor = acls;
  const pointCard = card('Pointing', [
    kv('Hour angle',   fmtHA(c.ha)),
    kv('Altitude',     `<span class="${altColor}">${fmtDeg(c.alt)}</span>`),
    kv('Azimuth',      fmtDeg(c.az)),
    kv('Airmass',      `<span class="${altColor}">${c.secz > 0 && c.secz < 100 ? c.secz.toFixed(3) : '—'}</span>`),
    kv('Parang',       fmtDeg(c.pa, 1)),
    kv('Quality',      `<span class="${altColor}">${acls.charAt(0).toUpperCase()+acls.slice(1)}</span>`),
  ].join(''));

  // SKY card
  const illumPct = (c.moonIllum * 100).toFixed(0);
  const moonUpStr = c.moonAlt > 0
    ? `<span class="good">${fmtDeg(c.moonAlt)} (up)</span>`
    : `<span class="muted" style="color:var(--muted)">${fmtDeg(c.moonAlt)} (down)</span>`;
  const skyCard = card('Sky', [
    kv('Sun altitude', `<span class="${scls}">${fmtDeg(c.sunAlt)} — ${sunLabel(c.sunAlt)}</span>`),
    kv('Moon altitude', moonUpStr),
    kv('Moon phase',   c.moonPhase),
    kv('Moon illum.',  `${illumPct}% <span class="moon-illum-bar"><span class="moon-illum-fill" style="width:${illumPct}%"></span></span>`),
    kv('Moon dist.',   fmtDeg(c.moonDistDeg, 1)),
  ].join(''));

  // CORRECTIONS card
  const corrCard = card('Corrections', [
    kv('Helio &Delta;t', `${c.hc.tcor.toFixed(2)} s`),
    kv('Helio &Delta;v', `${c.hc.vcor.toFixed(3)} km/s`),
    kv('BJD',            c.bjd.toFixed(5)),
  ].join(''));

  // COORDINATES card
  const coordCard = card('Coordinates', [
    kv('Galactic l',  fmtDeg(c.gal.glong, 2)),
    kv('Galactic b',  fmtDeg(c.gal.glat,  2)),
    kv('Ecliptic &lambda;', fmtDeg(c.ecl.eclong, 2)),
    kv('Ecliptic &beta;',   fmtDeg(c.ecl.eclat,  2)),
  ].join(''));

  document.getElementById('circ-cards').innerHTML =
    timeCard + objCard + pointCard + skyCard + corrCard + coordCard;

  updateHeaderJD();
}

// ── Render Almanac ─────────────────────────────────────────────────
function evtRow(label, times, cls) {
  const lcls = cls ? ` class="${cls}"` : '';
  return `<div class="almanac-event">
    <span class="event-label">${label}</span>
    <div class="event-times">
      <div class="event-local${lcls}">${times.local}</div>
      <div class="event-ut">${times.ut}</div>
    </div>
  </div>`;
}

function renderAlmanac() {
  const a = computeAlmanac(AppState);

  const sunSection = `<div class="almanac-card">
    <div class="card-title">Sun — ${a.locDate}</div>
    ${evtRow('Sunset',              a.sunset,  'civil')}
    ${evtRow('Civil twilight eve',  a.eveT6,   'civil')}
    ${evtRow('Nautical twilight eve', a.eveT12, 'nautical')}
    ${evtRow('Astro twilight eve',  a.eveT18,  'astro')}
    ${evtRow('Astro twilight morn', a.mornT18, 'astro')}
    ${evtRow('Nautical twilight morn', a.mornT12, 'nautical')}
    ${evtRow('Civil twilight morn', a.mornT6,  'civil')}
    ${evtRow('Sunrise',             a.sunrise, 'civil')}
  </div>`;

  const illumPct = (a.moonIllumMid * 100).toFixed(0);
  const moonSection = `<div class="almanac-card">
    <div class="card-title">Moon</div>
    ${evtRow('Moonset',  a.moonset,  'astro')}
    ${evtRow('Moonrise', a.moonrise, 'astro')}
    <div class="almanac-event">
      <span class="event-label">Phase at midnight</span>
      <span class="event-times"><span class="event-local" style="color:var(--moon)">${illumPct}% lit</span><div class="event-ut">${a.moonPhaseMid}</div></span>
    </div>
    <div class="almanac-event">
      <span class="event-label">LMST at midnight</span>
      <span class="event-times"><span class="event-local">${fmtHMSplain(a.lmstMid)}</span></span>
    </div>
  </div>`;

  const darkStr  = a.darkHours !== null ? a.darkHours.toFixed(1) + 'h' : '—';
  const mDarkStr = a.moonDarkHours !== null ? a.moonDarkHours.toFixed(1) + 'h' : '—';

  const darkBox = `<div class="dark-hours-box">
    <div>
      <div class="dark-hours-label">Astronomical dark</div>
      <div class="dark-hours-val">${darkStr}</div>
    </div>
    <div style="text-align:right">
      <div class="dark-hours-label">Moon-free dark</div>
      <div class="dark-hours-val" style="color:var(--moon)">${mDarkStr}</div>
    </div>
  </div>`;

  document.getElementById('almanac-content').innerHTML =
    `<div class="almanac-grid">${sunSection}${moonSection}</div>${darkBox}`;
}

// ── Render Planets ─────────────────────────────────────────────────
function renderPlanets() {
  const rows = computePlanets(AppState);

  let html = `<div style="overflow-x:auto"><table class="sky-table">
  <thead><tr>
    <th>Object</th>
    <th>RA</th>
    <th>Dec</th>
    <th>HA</th>
    <th>Alt</th>
    <th>Az</th>
    <th>Airmass</th>
  </tr></thead><tbody>`;

  rows.forEach(r => {
    const acls  = airmassClass(r.secz);
    const rowCls = r.type === 'sun' ? 'sun-row' : r.type === 'moon' ? 'moon-row' : '';
    const below  = r.alt < 0;
    const seczStr = (!below && r.secz < 100) ? r.secz.toFixed(3) : '—';
    const altStr  = `${r.alt.toFixed(1)}&deg;`;

    html += `<tr class="${rowCls}${below?' below':''}">
      <td><strong>${r.name}</strong></td>
      <td>${fmtHMSplain(r.ra)}</td>
      <td>${r.dec.toFixed(2)}&deg;</td>
      <td>${fmtHMSplain(r.ha)}</td>
      <td>${below ? '<span style="color:var(--muted)">'+altStr+'</span>' : altStr}</td>
      <td>${r.az.toFixed(1)}&deg;</td>
      <td><span class="${below?'poor':acls}">${seczStr}</span></td>
    </tr>`;
  });

  html += '</tbody></table></div>';
  document.getElementById('planets-content').innerHTML = html;
}

// ── Render Hourly ──────────────────────────────────────────────────
function renderHourly() {
  const rows = computeHourly(AppState);
  if (!rows.length) {
    document.getElementById('hourly-content').innerHTML = '<div class="no-data">No nighttime data found.</div>';
    return;
  }

  let html = `<div class="hourly-wrap"><table class="sky-table">
  <thead><tr>
    <th>Local time</th>
    <th>HA</th>
    <th>Alt</th>
    <th>Az</th>
    <th>Airmass</th>
    <th>Parang</th>
    <th>Sun alt</th>
    <th>Moon alt</th>
  </tr></thead><tbody>`;

  let lastDate = '';
  rows.forEach(r => {
    const acls     = airmassClass(r.secz);
    const scls     = sunClass(r.sunAlt);
    const below    = r.alt < 0;
    const seczStr  = (!below && r.secz < 100) ? r.secz.toFixed(2) : '—';
    const moonStr  = r.moonAlt > 0 ? r.moonAlt.toFixed(1)+'&deg;' : '<span style="color:var(--muted)">—</span>';
    const sunStr   = r.sunAlt < -18 ? `<span class="night">${r.sunAlt.toFixed(1)}&deg;</span>`
                   : `<span class="${scls}">${r.sunAlt.toFixed(1)}&deg;</span>`;

    // Date separator
    let dateRow = '';
    if (r.localDate !== lastDate) {
      lastDate = r.localDate;
      dateRow = `<tr><td colspan="8" style="color:var(--muted);font-size:11px;padding:6px 10px;background:var(--surface)">${r.localDate}</td></tr>`;
    }

    html += dateRow + `<tr>
      <td class="mono">${r.localTime}</td>
      <td>${fmtHMSplain(r.ha)}</td>
      <td><span class="${below?'poor':acls}">${r.alt.toFixed(1)}&deg;</span></td>
      <td>${r.az.toFixed(0)}&deg;</td>
      <td><span class="${below?'poor':acls}">${seczStr}</span></td>
      <td>${r.pa.toFixed(0)}&deg;</td>
      <td>${sunStr}</td>
      <td>${moonStr}</td>
    </tr>`;
  });

  html += '</tbody></table></div>';
  document.getElementById('hourly-content').innerHTML = html;
}

// ── Render Observability ───────────────────────────────────────────
function renderObservability() {
  const startStr = document.getElementById('obs-start').value;
  const endStr   = document.getElementById('obs-end').value;
  const sunAlt   = parseFloat(document.getElementById('obs-sunalt').value) || -18;

  if (!startStr || !endStr) {
    document.getElementById('obs-content').innerHTML = '<div class="no-data">Enter start and end dates, then click Compute.</div>';
    return;
  }

  const [sy, sm, sd] = startStr.split('-').map(Number);
  const [ey, em, ed] = endStr.split('-').map(Number);
  const startJD = dateToJD(sy, sm, sd, 12, 0, 0);
  const endJD   = dateToJD(ey, em, ed, 12, 0, 0);

  if (endJD <= startJD) {
    document.getElementById('obs-content').innerHTML = '<div class="no-data">End date must be after start date.</div>';
    return;
  }

  const results = computeObservability(AppState, startJD, endJD, sunAlt);

  if (!results.length) {
    document.getElementById('obs-content').innerHTML = '<div class="no-data">No observable nights found in range.</div>';
    return;
  }

  function haSeczStr(obj) {
    if (!obj) return '<td>—</td><td>—</td>';
    const seczStr = (obj.secz > 0 && obj.secz < 100) ? obj.secz.toFixed(2) : '—';
    return `<td>${fmtHMSplain(obj.ha)}</td><td><span class="${airmassClass(obj.secz)}">${seczStr}</span></td>`;
  }

  let html = `<div style="overflow-x:auto"><table class="sky-table">
  <thead><tr>
    <th>Date</th>
    <th>Phase</th>
    <th colspan="2">Evening</th>
    <th colspan="2">Midnight</th>
    <th colspan="2">Morning</th>
    <th>&lt;3</th>
    <th>&lt;2</th>
    <th>&lt;1.5</th>
  </tr>
  <tr>
    <th></th><th></th>
    <th>HA</th><th>Airmass</th>
    <th>HA</th><th>Airmass</th>
    <th>HA</th><th>Airmass</th>
    <th>hrs</th><th>hrs</th><th>hrs</th>
  </tr></thead><tbody>`;

  results.forEach(r => {
    const phaseCls = r.phase === 'N' ? 'tag-new' : 'tag-full';
    const phaseLabel = r.phase === 'N' ? 'New' : 'Full';
    html += `<tr>
      <td>${r.dateStr}</td>
      <td><span class="${phaseCls}">${phaseLabel}</span></td>
      ${haSeczStr(r.eve)}
      ${haSeczStr(r.ctr)}
      ${haSeczStr(r.morn)}
      <td><span class="marginal">${r.hrs3}</span></td>
      <td><span class="good">${r.hrs2}</span></td>
      <td><span class="excellent">${r.hrs1p5}</span></td>
    </tr>`;
  });

  html += '</tbody></table></div>';
  document.getElementById('obs-content').innerHTML = html;
}

// ── Custom site modal ──────────────────────────────────────────────
function openModal() {
  const x = SITES.find(s => s.code === 'x');
  document.getElementById('cs-name').value  = x.name;
  document.getElementById('cs-lat').value   = x.lat.toFixed(4);
  // Convert west-positive hours to east-positive degrees
  document.getElementById('cs-lon').value   = (-x.longit * 15).toFixed(4);
  document.getElementById('cs-elev').value  = x.elevsea;
  document.getElementById('cs-horiz').value = x.elevhoriz;
  document.getElementById('cs-zone').value  = (-x.stdz).toFixed(1);
  document.getElementById('cs-dst').value   = x.useDST;
  elModalOver.classList.add('visible');
}

function closeModal() { elModalOver.classList.remove('visible'); }

function saveModal() {
  const x = SITES.find(s => s.code === 'x');
  x.name      = document.getElementById('cs-name').value || 'Custom Site';
  x.lat       = parseFloat(document.getElementById('cs-lat').value) || 0;
  const lonE  = parseFloat(document.getElementById('cs-lon').value) || 0;
  x.longit    = -lonE / 15;  // convert east degrees to west hours
  x.elevsea   = parseFloat(document.getElementById('cs-elev').value)  || 0;
  x.elevhoriz = parseFloat(document.getElementById('cs-horiz').value) || 0;
  const zoneE = parseFloat(document.getElementById('cs-zone').value)  || 0;
  x.stdz      = -zoneE;  // convert east hours to west-positive
  x.useDST    = parseInt(document.getElementById('cs-dst').value) || 0;

  // Update the dropdown option label
  const opts = elSite.options;
  for (let i = 0; i < opts.length; i++) {
    if (parseInt(opts[i].value) === SITES.indexOf(x)) {
      opts[i].textContent = x.name;
    }
  }
  AppState.site = x;
  closeModal();
  renderActiveTab();
}

// ── Event listeners ────────────────────────────────────────────────
elSite.addEventListener('change', () => {
  const idx = parseInt(elSite.value);
  AppState.site = SITES[idx];
  if (AppState.site.code === 'x') openModal();
  else renderActiveTab();
  updateHeaderJD();
});

elRA.addEventListener('change', () => {
  AppState.ra = parseRA(elRA.value);
  stopNowMode();
  renderActiveTab();
});

elDec.addEventListener('change', () => {
  AppState.dec = parseDec(elDec.value);
  stopNowMode();
  renderActiveTab();
});

elEpoch.addEventListener('change', () => {
  AppState.epoch = parseFloat(elEpoch.value) || 2000.0;
  stopNowMode();
  renderActiveTab();
});

elNowBtn.addEventListener('click', () => {
  if (AppState.isNowMode) stopNowMode();
  else startNowMode();
});

elDate.addEventListener('change', () => {
  stopNowMode();
  AppState.jdUT = jdFromInputs();
  renderActiveTab();
  updateHeaderJD();
});

elTime.addEventListener('change', () => {
  stopNowMode();
  AppState.jdUT = jdFromInputs();
  renderActiveTab();
  updateHeaderJD();
});

elUTCheck.addEventListener('change', () => {
  stopNowMode();
  AppState.jdUT = jdFromInputs();
  renderActiveTab();
  updateHeaderJD();
});

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

document.getElementById('obs-compute-btn').addEventListener('click', renderObservability);
document.getElementById('modal-save').addEventListener('click', saveModal);
document.getElementById('modal-cancel').addEventListener('click', closeModal);
elModalOver.addEventListener('click', e => { if (e.target === elModalOver) closeModal(); });

// ── Init ───────────────────────────────────────────────────────────
function init() {
  populateSiteSelect();

  // Default observability date range: next 6 months
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const todayStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  const futureDate = new Date(now);
  futureDate.setMonth(futureDate.getMonth() + 6);
  const futureStr = `${futureDate.getFullYear()}-${pad(futureDate.getMonth()+1)}-${pad(futureDate.getDate())}`;
  document.getElementById('obs-start').value = todayStr;
  document.getElementById('obs-end').value   = futureStr;

  AppState.jdUT = nowToJD();
  updateTimeInputsFromJD(AppState.jdUT);
  renderCircumstances();
  startNowMode();
}

// ── Inject math engine then init ───────────────────────────────────
// The math engine script tag is above; it's already loaded if this script runs.
// We check for a required symbol to confirm.
if (typeof lst === 'undefined') {
  // Math engine not loaded yet — should not happen with inline embed
  console.error('Math engine not loaded!');
} else {
  init();
}
</script>
